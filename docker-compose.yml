services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://claimvision:claimvision_pass@db:5432/claimvision_ia
      - MODELS_DIR=/app/models
      - LOG_LEVEL=INFO
      - ORIGINS=["*"]
      - OLLAMA_URL=http://172.17.0.1:11434
    volumes:
      - ./models:/app/models
    restart: unless-stopped

networks:
  default:
    external: true
    name: claimvision_net
