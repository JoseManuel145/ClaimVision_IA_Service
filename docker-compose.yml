
services:
  api:
    build: .
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://claimvision:claimvision_pass@db:5432/claimvision_ia
      - MODELS_DIR=/app/models
      - LOG_LEVEL=INFO
      - ORIGINS=["*"]
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
